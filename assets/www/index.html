<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Tooth Editor</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #2b2b2b;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        #internal-loader {
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            letter-spacing: 1px;
            z-index: 100;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(168, 85, 247, 1);
            display: none;
        }
    </style>
</head>

<body>
    <div id="canvas-container"></div>
    <div id="internal-loader">DECOMPRESSING MODEL...</div>

    <script type="module">
        import * as THREE from 'https://esm.sh/three@0.160.0';
        import { GLTFLoader } from 'https://esm.sh/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
        import { OrbitControls } from 'https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls.js';
        import { TransformControls } from 'https://esm.sh/three@0.160.0/examples/jsm/controls/TransformControls.js';

        // 1. Scene Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // 2. Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 2.5);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 2.0);
        directionalLight.position.set(5, 10, 7.5);
        scene.add(directionalLight);

        // 2b. Floor Grid
        const gridSize = 100;
        const gridDivisions = 100;
        const gridHelper = new THREE.GridHelper(gridSize, gridDivisions, 0x444444, 0x224488);
        gridHelper.position.y = -2;
        gridHelper.material.opacity = 0.25;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);

        // 2c. Blender-style Floor Axes (Red = X, Green = Z in Three.js ground)
        const xAxiGeom = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(-gridSize / 2, -1.99, 0),
            new THREE.Vector3(gridSize / 2, -1.99, 0)
        ]);
        const xAxis = new THREE.Line(xAxiGeom, new THREE.LineBasicMaterial({ color: 0xff3333, transparent: true, opacity: 0.5 }));
        scene.add(xAxis);

        const zAxiGeom = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(0, -1.99, -gridSize / 2),
            new THREE.Vector3(0, -1.99, gridSize / 2)
        ]);
        const zAxis = new THREE.Line(zAxiGeom, new THREE.LineBasicMaterial({ color: 0x33ff33, transparent: true, opacity: 0.5 }));
        scene.add(zAxis);

        // 3. Controls
        const orbit = new OrbitControls(camera, renderer.domElement);
        orbit.enableDamping = true;

        const transform = new TransformControls(camera, renderer.domElement);
        transform.setMode('rotate');
        transform.visible = false;
        transform.enabled = false;
        transform.addEventListener('dragging-changed', (e) => {
            orbit.enabled = !e.value;
        });
        scene.add(transform);

        let pivotGroup = new THREE.Group();
        scene.add(pivotGroup);

        const loader = new GLTFLoader();

        // 4. Bridge to Flutter
        function logToFlutter(type, msg) {
            if (window.ThreeJSChannel) {
                const payload = typeof msg === 'string' ? { message: msg } : msg;
                window.ThreeJSChannel.postMessage(JSON.stringify({ type, ...payload }));
            }
        }

        logToFlutter('ready', 'Bridge Online');

        window.onerror = (m, u, l) => logToFlutter('debug', `CRASH: ${m} at line ${l}`);

        window.loadModelBase64 = function (base64Data) {
            document.getElementById('internal-loader').style.display = 'block';
            try {
                const binaryString = atob(base64Data);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }

                loader.parse(bytes.buffer, '', (gltf) => {
                    const model = gltf.scene;
                    while (pivotGroup.children.length > 0) pivotGroup.remove(pivotGroup.children[0]);
                    transform.detach();

                    const box = new THREE.Box3().setFromObject(model);
                    const center = box.getCenter(new THREE.Vector3());
                    const size = box.getSize(new THREE.Vector3());

                    model.position.sub(center);
                    pivotGroup.add(model);

                    const maxDim = Math.max(size.x, size.y, size.z);
                    pivotGroup.scale.setScalar(4 / maxDim);

                    transform.attach(pivotGroup);
                    window.setEditMode(false);

                    document.getElementById('internal-loader').style.display = 'none';
                    syncToFlutter();
                }, (error) => {
                    logToFlutter('debug', `PARSE_ERROR: ${error}`);
                });
            } catch (e) {
                logToFlutter('debug', `BYTE_CRASH: ${e.message}`);
            }
        };

        function syncToFlutter() {
            const rot = pivotGroup.rotation;
            logToFlutter('sync', {
                rx: rot.x * 180 / Math.PI,
                ry: rot.y * 180 / Math.PI,
                rz: rot.z * 180 / Math.PI,
                zoom: camera.position.length(),
                targetX: pivotGroup.position.x,
                targetY: pivotGroup.position.y,
                targetZ: pivotGroup.position.z
            });
        }

        // Programmatic Camera Control
        window.setCameraOrbit = (thetaDeg, phiDeg, distance) => {
            const theta = thetaDeg * Math.PI / 180;
            const phi = phiDeg * Math.PI / 180;

            const x = distance * Math.sin(phi) * Math.sin(theta);
            const y = distance * Math.cos(phi);
            const z = distance * Math.sin(phi) * Math.cos(theta);

            camera.position.set(x, y, z);
            camera.lookAt(orbit.target);
            orbit.update();
            syncToFlutter();
        };

        window.resetView = () => {
            orbit.reset();
            pivotGroup.rotation.set(0, 0, 0);
            pivotGroup.position.set(0, 0, 0);
            transform.detach();
            transform.attach(pivotGroup);
            window.setEditMode(false);
            syncToFlutter();
        };

        window.setGizmoMode = (mode) => {
            transform.setMode(mode);
        };

        window.setEditMode = (active) => {
            transform.enabled = active;
            transform.visible = active;
        };

        window.setLocked = (locked) => { orbit.enabled = !locked; };

        function animate() {
            requestAnimationFrame(animate);
            orbit.update();
            renderer.render(scene, camera);
            if (transform.dragging) syncToFlutter();
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
